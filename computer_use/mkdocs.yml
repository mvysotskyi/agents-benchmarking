site_name: Claude Computer Use Agent
site_description: Interactive browser automation with Claude AI
site_url: https://example.com/computer-use

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Agent Loop: agent-loop.md
  - Models: models.md
  - Providers: providers.md
  - Agentic Interactions:
    - Overview: interactions/overview.md
    - Screenshot: interactions/screenshot.md
    - Click Actions: interactions/click.md
    - Text Input: interactions/type.md
    - Scrolling: interactions/scroll.md
    - Navigation: interactions/navigation.md
