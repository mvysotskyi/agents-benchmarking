- id: "tc_circuit_009"
  prompt: |-
    # Build a 1-Bit Comparator with Three Outputs
    
    ## GOAL
    Construct a circuit that compares two 1-bit inputs A and B and produces three outputs:
    
    A_GT_B = 1 when A > B
    A_EQ_B = 1 when A = B
    A_LT_B = 1 when A < B
    
    ## REQUIREMENTS
    
    1. Add the following components:
       - Two input switches: A and B
       - Two NOT gates
       - Two AND gates
       - One XNOR gate
          (If XNOR is unavailable, implement equality using XOR + NOT.)
       - Three output switches: A_GT_B, A_EQ_B, and A_LT_B
    
    2. Wiring:
       - Implement A_GT_B = A * B' using one NOT gate and one AND gate.
       - Implement A_LT_B = A' * B using the other NOT gate and the second AND gate.
       - Implement A_EQ_B = A XNOR B using the XNOR gate (or XOR followed by NOT if necessary).
    
    3. Define outputs:
       - The output of the first AND gate must be the circuit output A_GT_B.
       - The output of the second AND gate must be the circuit output A_LT_B.
       - The output of the XNOR gate must be the circuit output A_EQ_B.
    
    # RESULT FORMAT
    
    ```json
    {"answer": "done"}
    ```
