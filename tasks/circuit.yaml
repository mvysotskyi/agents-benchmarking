- id: "tc_circuit_011"
  prompt: |-
    # Build a 3-Input Odd-Parity Circuit
    
    ## GOAL
    Construct a circuit with three binary inputs (A, B, C) and one output (Y) such that:
    - Y = 1 when an odd number of inputs are 1
    - Y = 0 when an even number of inputs are 1
    
    Examples:
    - 000 -> 0
    - 001 -> 1
    - 010 -> 1
    - 011 -> 0
    - 111 -> 1
    
    ## REQUIREMENTS
    
    1. Add the following components:
       - Three input switches: A, B, C
       - Two XOR gates
       - One output switch: Y
    
    2. Wiring:
       - Implement Y = A XOR B XOR C using two chained XOR gates.
    
    3. Define output:
       - The final parity result must be the circuit output Y.
    
    # RESULT FORMAT
    
    ```json
