- id: "tc_circuit_006"
  prompt: |-
    # Design a 2-to-1 Multiplexer Using Logic Gates
    
    ## GOAL
    Implement a circuit whose output follows the equation:
    Y = S' * A + S * B
    
    ## REQUIREMENTS
    
    1. Add the following components:
       - Two input switches: A and B
       - One select switch: S
       - One NOT gate
       - Two AND gates
       - One OR gate
       - One output switch: Y
    
    2. Wiring:
       - Invert S using the NOT gate to generate S'.
       - Connect S' and A to the first AND gate.
       - Connect S and B to the second AND gate.
       - Connect the outputs of both AND gates to the OR gate.
    
    3. Define output:
       - The output of the OR gate must be the circuit output Y.
    
    # RESULT FORMAT
    
