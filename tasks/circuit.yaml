    # Multi-Loop DC Network (Kirchhoff's Test)
    
    ## GOAL
    Construct a multi-loop DC network and measure the current through the grounded resistor.
    
    ## REQUIREMENTS
    
    1. Add and configure components:
       - Add a 2-terminal DC Voltage Source (left side) and set its voltage to 15 V.
       - Add a 2-terminal DC Voltage Source (right side) and set its voltage to 9 V.
       - Add a Resistor (R1) and set its resistance to 1 k ohms.
       - Add a Resistor (R2) and set its resistance to 2.2 k ohms.
       - Add a Resistor (R3) and set its resistance to 3.3 k ohms.
       - Add a Ground connection.
    
    2. Wiring:
       - Ground the negative terminal of the 15 V source.
       - Ground the negative terminal of the 9 V source.
       - Connect one end of R1 to the positive terminal of the 15 V source.
       - Connect one end of R2 to the positive terminal of the 9 V source.
       - Connect the free ends of R1 and R2 together at a single top junction.
       - Connect the top end of R3 to the junction between R1 and R2.
       - Connect the bottom end of R3 to Ground.
    
    ## FINAL INSTRUCTION
    Once the circuit reaches a steady state, hover your mouse over Resistor R3 (the 3.3 k ohm resistor) and report the exact Current (I) displayed in the information box at the bottom right corner of the screen.
    
