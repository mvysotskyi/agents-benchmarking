- id: "tc_circuit_012"
  prompt: |-
    # Build a Full-Adder Using Logic Gates
    
    ## GOAL
    Construct a circuit that computes the 1-bit full-adder functions:
    
    SUM  = A XOR B XOR CIN
    COUT = majority(A, B, CIN)
    
    Inputs:
    A, B, CIN
    
    Outputs:
    SUM, COUT
    
    ## REQUIREMENTS
    
    1. Add the following components:
       - Three input switches: A, B, CIN
       - Logic gates as needed
       - Two output switches: SUM and COUT
    
    2. Wiring:
       - The SUM output must equal:
            A XOR B XOR CIN
       - The carry-out COUT must be 1 when at least two of the three inputs are 1.
       - The implementation for carry-out is:
            COUT = A * B + A * CIN + B * CIN
    
    3. Define outputs:
       - The output wire for the sum computation must be the circuit output SUM.
       - The output wire for the carry computation must be the circuit output COUT.
    
    # RESULT FORMAT
    
    ```json
