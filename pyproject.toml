[tool.poetry]
name = "Agent Evaluation Framework"
version = "0.1.0"
description = ""
authors = ["Arkadiusz Drohomirecki <adroh@softserveinc.com>"]
readme = "README.md"
packages = [
    { include = "agisdk", from = "src" },
    { include = "eval", from = "src" }
]

[tool.poetry.dependencies]
python = "^3.11"
numpy = "^1.20.0"
pillow = ">=10.0.0,<11.0.0"
gymnasium = "^0.28.0"
playwright = "^1.20.0"
tqdm = "^4.62.0"
