openai = "^1.0.0"
pyparsing = "^3.0.0"
regex = "^2022.0.0"
jmespath = "^1.0.0"
beautifulsoup4 = "^4.10.0"
tiktoken = "^0.3.0"
anthropic = "^0.5.0"
ray = "^2.8.0"
rich = "^14.1.0"
requests = "^2.25.0"
lxml = "^6.0.1"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
