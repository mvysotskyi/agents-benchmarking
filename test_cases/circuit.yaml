- id: "tc_circuit_004"
  prompt: |-
    # Build a 3-bit Two's-Complement Negator with Overflow Flag
    
    ## GOAL
    Construct a combinational circuit that takes a 3-bit two's-complement signed integer A = (A2, A1, A0), where A2 is the sign bit and the represented value is
    
      val(A) = -4·A2 + 2·A1 + A0   (range: -4 .. +3)
    
    and produces:
    - A 3-bit two's-complement output Y = (Y2, Y1, Y0) such that val(Y) = -val(A) whenever -val(A) is representable in 3-bit two's complement.
    - A 1-bit overflow flag OVF that is 1 if and only if A = 100 (i.e. val(A) = -4), because +4 cannot be represented in 3-bit two's complement. When OVF = 1, the value of Y is unconstrained (don't-care).
    
    The negation must be computed as Y = (NOT A) + 1 using bitwise inversion followed by a 3-bit ripple-carry incrementer. 
    
    ## STEPS
    
    1. Add the following components:
     - Three input switches: A2, A1, A0
     - Four output switches: Y2, Y1, Y0, OVF
     - AND, OR, NOT, NAND, NOR, XOR, XNOR gates as needed
    
    2. Build the circuit so that:
     - First stage: compute B0 = NOT A0, B1 = NOT A1, B2 = NOT A2 using NOT gates.
     - Second stage: ripple-carry increment B by 1 using three half-adders chained by carry:
       - Bit 0: Y0 = B0 XOR 1 = NOT B0 (equivalently, Y0 = A0); carry C1 = B0 AND 1 = B0.
       - Bit 1: Y1 = B1 XOR C1; carry C2 = B1 AND C1.
       - Bit 2: Y2 = B2 XOR C2. (The final carry-out is discarded — it does not feed OVF.)
     - Overflow: OVF = A2 AND (NOT A1) AND (NOT A0). This is the only input pattern for which the negation overflows.
     - Y must produce the correct value for all 7 non-overflow input combinations, and OVF must be correct for all 8 input combinations.
    
    3. Define outputs:
     - The four circuit outputs must be Y2, Y1, Y0, OVF.
    
    # RESULT FORMAT
    
    ```json
    {"answer": "done"}
    ```
