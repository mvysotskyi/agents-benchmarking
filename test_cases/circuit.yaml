- id: "tc_circuit_008"
  prompt: |-
    # Build a Half-Adder Using Logic Gates
    
    ## GOAL
    Implement a circuit that computes the binary half-adder functions:
    
    SUM   = A XOR B
    CARRY = A AND B
    
    ## STEPS
    
    1. Add the following components:
       - Two input switches: A and B
       - One XOR gate
       - One AND gate
       - Two output switches: SUM and CARRY
    
    2. Wiring:
       - Connect A and B to the inputs of the XOR gate.
       - Connect A and B to the inputs of the AND gate.
       - Both A and B must fan out to both gates.
    
    3. Define outputs:
       - The output of the XOR gate must be the circuit output SUM.
       - The output of the AND gate must be the circuit output CARRY.
    
    # RESULT FORMAT
    
    ```json
    {"answer": "done"}
    ```
  gt: {}
- id: "tc_circuit_009"
  prompt: |-
    # Build a 1-Bit Comparator with Three Outputs
    
    ## GOAL
    Construct a circuit that compares two 1-bit inputs A and B and produces three outputs:
    
    A_GT_B = 1 when A > B
    A_EQ_B = 1 when A = B
    A_LT_B = 1 when A < B
    
    ## STEPS
    
    1. Add the following components:
       - Two input switches: A and B
       - Two NOT gates
       - Two AND gates
       - One XNOR gate
       - Three output switches: A_GT_B, A_EQ_B, and A_LT_B
    
    2. Wiring:
       - Connect input B to the first NOT gate.
       - Connect input A and the output of the first NOT gate to the inputs of the first AND gate.
       - Connect input A to the second NOT gate.
       - Connect the output of the second NOT gate and input B to the inputs of the second AND gate.
       - Connect inputs A and B to the inputs of the XNOR gate.
    
    3. Define outputs:
       - The output of the first AND gate must be the circuit output A_GT_B.
       - The output of the second AND gate must be the circuit output A_LT_B.
       - The output of the XNOR gate must be the circuit output A_EQ_B.
    
    # RESULT FORMAT
    
    ```json
    {"answer": "done"}
    ```
  gt: {}
- id: "tc_circuit_010"
  prompt: |-
    # Build a 2-Input Priority Encoder
    
    ## GOAL
    Construct a circuit with two inputs, A (high priority) and B (low priority), that generates two outputs to indicate if the system is active and which input is being serviced.
    
    ## STEPS
    
    1. Add the following components:
       - Two input switches: A and B
       - One OR gate
       - Two output switches: ACTIVE and ID
    
    2. Wiring:
       - Connect both A and B to the inputs of the OR gate.
       - Connect input A directly to the circuit output ID.
    
    3. Define outputs:
       - The output of the OR gate must be the circuit output ACTIVE.
       - The direct wire from A must be the circuit output ID.
    
    # RESULT FORMAT
    
    ```json
    {"answer": "done"}
    ```
