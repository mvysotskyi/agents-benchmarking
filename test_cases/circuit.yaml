- id: "tc_circuit_016"
  prompt: |-
    # Wien Bridge Oscillator with Diode AGC
     
     ## GOAL
     Build a Wien-bridge oscillator using an op-amp with positive-feedback RC network and a negative-feedback gain network. Use anti-parallel diodes for soft amplitude limiting (automatic gain control), let the loop self-start from a small initial-condition seed, and report both the steady-state oscillation frequency and the peak-to-peak output voltage at the op-amp output.
     
     ## STEPS
     
     1. Add and configure components:
      - Add an Op Amp (use the default model, finite-GBW, rails at ±15 V).
      - Positive-feedback (Wien) network:
      - Resistor Rs = 10 k ohms (series arm).
      - Capacitor Cs = 10 nF (series arm).
      - Resistor Rp = 10 k ohms (parallel arm).
      - Capacitor Cp = 10 nF (parallel arm).
      - Negative-feedback (gain-setting) network with diode AGC:
      - Resistor Rg = 10 k ohms (from − input to ground).
      - Resistor Rf_a = 12 k ohms (first half of the feedback resistor).
      - Resistor Rf_b = 10 k ohms (second half of the feedback resistor; the diodes shunt this part as the swing grows).
      - Two anti-parallel diodes (default Si model), each connected across Rf_b.
      - Add Ground connections.
     
     2. Wiring:
      - Positive-feedback network (between op-amp OUTPUT and the + input):
      - Rs from op-amp OUTPUT to a node "Node_S".
      - Cs from Node_S to the op-amp + input (call this node "Node_Plus").
      - Rp from Node_Plus to Ground.
      - Cp from Node_Plus to Ground (in parallel with Rp).
      - Negative-feedback network:
      - Rg from the op-amp − input to Ground.
      - Rf_a from the op-amp − input to a midpoint node "Node_FB_Mid".
      - Rf_b from Node_FB_Mid to op-amp OUTPUT.
      - Diode D1 from Node_FB_Mid (anode) to op-amp OUTPUT (cathode) — i.e., across Rf_b.
      - Diode D2 from op-amp OUTPUT (anode) to Node_FB_Mid (cathode) — i.e., the anti-parallel partner of D1, also across Rf_b.
     
     3. Seed start-up:
      - Right-click Cp (the cap in the parallel arm) → Edit → set Initial Voltage = 0.1 V (or higher if needed). CircuitJS1's components are noiseless, so without a seed the oscillator will not spontaneously start.
     
     4. Run the simulation.
     
     5. Right-click the op-amp OUTPUT terminal node and select "View in New Scope". In the scope's properties, enable BOTH "Show Frequency" AND "Show Peak-to-Peak". Let the simulation run long enough for the amplitude to grow into the diode-clamped steady state (~50–100 ms simulated). The frequency overlay needs at least 5–10 cycles visible per screen to lock in — if it reads blank, zoom the scope's TIME axis (not the voltage axis) until cycles are clearly resolved, then wait for the readout to stabilise.
     
     6. Report the exact Frequency and Peak-to-Peak values displayed on the scope.
     
     # RESULT FORMAT
     
     ```json
     {
      "oscillation_frequency": "value",
      "output_peak_to_peak": "value"
     }
     ```
  gt: {answer: "{\n  \"oscillation_frequency\": \"1.589 kHz\",\n  \"output_peak_to_peak\": \"1.422 V\"\n }"}
