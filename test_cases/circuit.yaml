- id: "tc_circuit_003"
  prompt: |-
    # Build a 1-to-4 Demultiplexer
    
    ## GOAL
    
    Implement a circuit with one data input D, two select bits S1 and S0, and four outputs Y0..Y3, such that D is routed to exactly one output chosen by (S1, S0) while the others stay low:
    
    Y0 = (NOT S1 AND NOT S0 AND D), Y1 = (NOT S1 AND S0 AND D), Y2 = (S1 AND NOT S0 AND D), Y3 = (S1 AND S0 AND D)
    
    ## STEPS
    
    1. Add the following components:
    - One data input switch: D
    - Two select input switches: S1, S0
    - Four output switches: Y0, Y1, Y2, Y3
    - Logical gates as needed
    
    2. Build the circuit so that:
    - For each Yi, build the 3-input AND of D and the select pattern for i.
    - Exactly one Yi can be 1 at any time, and only when D = 1.
    
    3. Define outputs:
    - The four circuit outputs must be Y0, Y1, Y2, Y3.
    
