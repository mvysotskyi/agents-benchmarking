- id: "tc_circuit_004"
  prompt: |-
    # Fan Out One Input to Two Outputs
    
    ## GOAL
    Construct a circuit where one input signal is copied directly to two outputs.
    
    ## STEPS
    
    1. Add the following components:
       - One input switch: A
       - Two output switches: Y1, Y2
    
    2. Wiring:
       - Connect input A directly to circuit output Y1.
       - Also connect input A directly to circuit output Y2.
       - Use only wires.
       - Do not add any logic gates.
    
    3. Define outputs:
       - The first direct wire from A must be the circuit output Y1.
       - The second direct wire from A must be the circuit output Y2.
    
    # RESULT FORMAT
    
