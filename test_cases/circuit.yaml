- id: "tc_circuit_013"
  prompt: |-
    # 555 Timer Astable: Output Frequency
     
     ## GOAL
     Configure a 555 timer in astable (free-running) mode and measure the exact output frequency and duty cycle on the oscilloscope.
     
     ## STEPS
     
     1. Add and configure components:
      - Add a 555 Timer chip.
      - Add a Voltage Source 1-terminal (Vcc) and set it to 5 V.
      - Add a Resistor (Ra) and set its resistance to 10 k ohms.
      - Add a Resistor (Rb) and set its resistance to 22 k ohms.
      - Add a Capacitor (Ct) and set its capacitance to 100 nF.
      - Add a Ground connection.
     
     2. Wiring:
      - Connect Vcc to Pin 8 (V+) of the 555.
      - Connect Pin 1 (GND) of the 555 to Ground.
      - Connect Pin 4 (RESET) of the 555 directly to Vcc (keep reset inactive).
      - Connect Ra between Vcc and Pin 7 (DISCH).
      - Connect Rb between Pin 7 (DISCH) and Pin 6 (THRESH).
      - Connect Pin 6 (THRESH) directly to Pin 2 (TRIG).
      - Connect Ct between Pin 6 (THRESH) and Ground.
     
     3. Right-click Pin 3 (OUT) of the 555 and select "View in New Scope". In the scope's properties, enable BOTH "Show Frequency" AND "Show Duty Cycle". Let the simulation run for at least 30 output cycles to let the measurements settle, then report the exact Frequency and Duty Cycle values displayed on the scope.
     
     # RESULT FORMAT
     
     ```json
     {
      "output_frequency": "value",
      "duty_cycle": "value"
     }
     ```
