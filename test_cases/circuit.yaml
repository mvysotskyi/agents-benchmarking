    # Common-Emitter BJT Amplifier: Mid-Band Peak-to-Peak Output
     
     ## GOAL
     Build a classic common-emitter BJT voltage amplifier with a voltage-divider bias network and a bypassed emitter resistor, and measure the peak-to-peak output voltage at the collector for a small AC input.
     
     ## STEPS
     
     1. Add and configure components:
      - Add a Voltage Source 1-terminal (Vcc) and set it to 12 V.
      - Add a Transistor (bipolar, NPN). Leave default model parameters.
      - Add a Resistor (R1) and set it to 47 k ohms (top bias).
      - Add a Resistor (R2) and set it to 10 k ohms (bottom bias).
      - Add a Resistor (Rc) and set it to 3.3 k ohms (collector).
      - Add a Resistor (Re) and set it to 1 k ohms (emitter).
      - Add a Capacitor (Cin) and set it to 1 uF (input coupling).
      - Add a Capacitor (Ce) and set it to 100 uF (emitter bypass).
      - Add a Capacitor (Cout) and set it to 1 uF (output coupling).
      - Add a Resistor (R_load) and set it to 10 k ohms.
      - Add a 1-terminal A/C Voltage Source (Vin) and set: Max Voltage = 10 mV, Frequency = 10 kHz, DC offset = 0, phase = 0.
      - Add a Ground connection.
     
     2. Wiring:
      - Connect Vcc to the top of R1 and to the top of Rc.
      - Connect the bottom of R1 and the top of R2 together — call this node "Base_Bias". Connect the transistor's base to Base_Bias.
      - Connect the bottom of R2 to Ground.
      - Connect the bottom of Rc to the transistor's collector. Call this node "Collector".
      - Connect the transistor's emitter to the top of Re. Call this node "Emitter".
      - Connect the bottom of Re to Ground.
      - Connect Ce between Emitter and Ground (parallel with Re).
      - Connect Cin between Vin and Base_Bias.
      - Connect Cout between Collector and one end of R_load. Call the other end of R_load "Node OUT".
      - Connect Node OUT to Ground through R_load (i.e., R_load is between Cout and Ground, and Node OUT is the junction with Cout).
     
     3. Right-click the wire at Node OUT (the load side of Cout) and select "View in New Scope". In the scope's properties, enable "Show Peak-to-Peak". Let the simulation run for at least 50 input cycles so all coupling capacitors fully charge and the amplifier settles into its operating point, then report the exact Peak-to-Peak value displayed on the scope.
     
