- id: "tc_circuit_005"
  prompt: |-
    # Build a 4-to-2 Priority Encoder with Valid Flag
    
    ## GOAL
    Construct a combinational circuit with four request inputs R3, R2, R1, R0 (R3 is the highest priority) and three outputs Y1, Y0, V such that:
    
    - V = 1 if at least one request is high; V = 0 otherwise.
    - When V = 1, (Y1, Y0) is the binary index of the highest-priority asserted input:
      R3 high → (Y1, Y0) = (1, 1)
      R3 low, R2 high → (1, 0)
      R3 low, R2 low, R1 high → (0, 1)
      only R0 high → (0, 0)
