- id: "tc_circuit_015"
  prompt: |-
    # 4-Bit Asynchronous Ripple Counter: MSB Output Frequency
     
     ## GOAL
     Build a 4-bit asynchronous (ripple) counter from JK flip-flops driven by a 1 kHz clock, and measure the output frequency at the MSB (Q3). Each flip-flop divides its clock input by 2, so a 4-bit ripple counter divides the master clock by 2^4 = 16.
     
     ## STEPS
     
     1. Add and configure components:
      - Add a Clock source (Inputs/Outputs menu → Clock, or use a Square-wave Voltage Source). Set: frequency = 1000 Hz, duty cycle = 50%, high level = 5 V, low level = 0 V.
      - Add four JK Flip-Flops (Chips menu → JK Flip-Flop). Label them FF0 (LSB) through FF3 (MSB).
      - Add a Logic Input set permanently to high (5 V) — used as a constant logic-1 source for the J and K pins.
      - Add a Logic Output for visualising Q3.
      - Add Ground.
     
     2. Wiring (asynchronous toggle counter):
      - Tie BOTH J and K of every flip-flop (FF0–FF3) to the constant-high Logic Input — this configures each one to toggle on every clock edge.
      - Connect the Clock source to the CLK input of FF0.
      - Connect Q (output) of FF0 → CLK of FF1.
      - Connect Q of FF1 → CLK of FF2.
      - Connect Q of FF2 → CLK of FF3.
      - Connect Q of FF3 → the Logic Output indicator.
      - Leave the !Q (inverted) outputs unconnected, and leave any RESET/SET pins unconnected (or tie them to the inactive level if the chip block exposes them).
     
     3. Click RUN.
     
     4. Right-click the wire at Q3 (the output of FF3) → View in New Scope. In the scope's properties, enable "Show Frequency". Let the simulation run for at least 1 second of simulated time so the counter cycles through all 16 states many times and the frequency overlay locks in.
     
     5. Report the frequency value displayed on the scope at Q3.
     
     # RESULT FORMAT
     
     The value must be a string containing the numeric frequency in Hz with units, e.g. "62.5 Hz". Do NOT emit the literal placeholder text "value". Do NOT omit units. Round to 1 decimal place if needed.
     
     ```json
     {
      "msb_output_frequency": "<frequency>"
     }
     ```
