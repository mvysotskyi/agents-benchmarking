test_cases:
- id: "tc_circuit_001"
  prompt: |-
    # Build a Direct Wire from Input to Output
    
    ## GOAL
    Construct the simplest possible circuit where the output follows the input directly.
    
    ## STEPS
    
    1. Add the following components:
       - One input switch: A
       - One output switch: Y
    
    2. Wiring:
       - Connect input A directly to the circuit output Y using only a wire.
       - Do not add any logic gates.
    
    3. Define output:
       - The direct wire from A must be the circuit output Y.
    
    # RESULT FORMAT
    
    ```json
    {"answer": "done"}
    ```
  gt: {}
